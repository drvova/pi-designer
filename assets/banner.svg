<svg viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Blueprint grid background -->
  <defs>
    <pattern id="smallGrid" width="16" height="16" patternUnits="userSpaceOnUse">
      <path d="M 16 0 L 0 0 0 16" fill="none" stroke="rgba(28,43,58,0.3)" stroke-width="0.5"/>
    </pattern>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <rect width="80" height="80" fill="url(#smallGrid)"/>
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="rgba(28,43,58,0.5)" stroke-width="1"/>
    </pattern>
  </defs>
  
  <!-- Base -->
  <rect width="1200" height="300" fill="#0b1623"/>
  <rect width="1200" height="300" fill="url(#grid)"/>
  
  <!-- Corner markers -->
  <g stroke="#1c2b3a" stroke-width="1.5" fill="none">
    <path d="M 24 24 L 24 48 M 24 24 L 48 24"/>
    <path d="M 1176 24 L 1176 48 M 1176 24 L 1152 24"/>
    <path d="M 24 276 L 24 252 M 24 276 L 48 276"/>
    <path d="M 1176 276 L 1176 252 M 1176 276 L 1152 276"/>
  </g>
  
  <!-- Leader line from left -->
  <g stroke="#00aeef" fill="#00aeef">
    <circle cx="80" cy="150" r="2"/>
    <line x1="80" y1="150" x2="280" y2="150" stroke-width="1"/>
  </g>
  
  <!-- Main title -->
  <text x="300" y="165" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="72" font-weight="700" fill="#f0f0f0" letter-spacing="-2">pi-designer</text>
  
  <!-- Technical label top -->
  <g>
    <text x="300" y="115" font-family="'JetBrains Mono', monospace" font-size="11" fill="#8b9bb4" letter-spacing="2">DESIGN SYSTEM INTERFACE</text>
    <line x1="300" y1="120" x2="520" y2="120" stroke="#1c2b3a" stroke-width="1"/>
  </g>
  
  <!-- Technical spec bottom -->
  <g>
    <line x1="300" y1="185" x2="460" y2="185" stroke="#1c2b3a" stroke-width="1"/>
    <text x="300" y="200" font-family="'JetBrains Mono', monospace" font-size="10" fill="#8b9bb4" letter-spacing="1.5">VERSION 1.0 • AGENT-READY</text>
  </g>
  
  <!-- Wireframe cube decoration right -->
  <g stroke="#00aeef" stroke-width="1" fill="none" opacity="0.4">
    <path d="M 1000 150 L 1050 125 L 1100 150 L 1050 175 Z"/>
    <path d="M 1000 150 L 1050 125 L 1050 95 L 1000 120 Z"/>
    <path d="M 1050 125 L 1100 150 L 1100 120 L 1050 95 Z"/>
    <line x1="1000" y1="150" x2="1000" y2="120"/>
    <line x1="1050" y1="175" x2="1050" y2="145"/>
    <line x1="1100" y1="150" x2="1100" y2="120"/>
  </g>
  
  <!-- Status indicator -->
  <g>
    <rect x="940" y="145" width="32" height="12" fill="none" stroke="#1c2b3a" stroke-width="1"/>
    <rect x="942" y="147" width="4" height="8" fill="#00ff9d"/>
    <text x="950" y="155" font-family="'JetBrains Mono', monospace" font-size="8" fill="#00ff9d">ACTIVE</text>
  </g>
  
  <!-- Grid coordinates -->
  <text x="1150" y="290" font-family="'JetBrains Mono', monospace" font-size="9" fill="#8b9bb4" opacity="0.6">12x3</text>
</svg>