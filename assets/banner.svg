<svg width="1280" height="480" viewBox="0 0 1280 480" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: workshop paper cream -->
  <rect width="1280" height="480" fill="#F5F1E8"/>
  
  <!-- Grid structure (visible, subtle) -->
  <line x1="64" y1="0" x2="64" y2="480" stroke="#D4CFC3" stroke-width="1"/>
  <line x1="320" y1="0" x2="320" y2="480" stroke="#D4CFC3" stroke-width="1"/>
  <line x1="640" y1="0" x2="640" y2="480" stroke="#D4CFC3" stroke-width="1"/>
  <line x1="960" y1="0" x2="960" y2="480" stroke="#D4CFC3" stroke-width="1"/>
  <line x1="0" y1="120" x2="1280" y2="120" stroke="#D4CFC3" stroke-width="1"/>
  <line x1="0" y1="240" x2="1280" y2="240" stroke="#D4CFC3" stroke-width="1"/>
  <line x1="0" y1="360" x2="1280" y2="360" stroke="#D4CFC3" stroke-width="1"/>
  
  <!-- Heavy graphite border (breaks at the bleed point) -->
  <rect x="0" y="0" width="1280" height="480" fill="none" stroke="#2A2825" stroke-width="8"/>
  
  <!-- The bold element: massive "REFUSES" that bleeds off the edge -->
  <g transform="translate(1100, 180) rotate(90)">
    <text 
      x="0" 
      y="0" 
      font-family="Arial Black, Helvetica, sans-serif" 
      font-size="160" 
      font-weight="900" 
      fill="#2A2825"
      letter-spacing="-6"
      text-anchor="start">REFUSES</text>
  </g>
  
  <!-- Primary heading: asymmetric top-left -->
  <text 
    x="64" 
    y="100" 
    font-family="Arial, Helvetica, sans-serif" 
    font-size="72" 
    font-weight="900" 
    fill="#2A2825"
    letter-spacing="-2">PI-DESIGNER</text>
  
  <!-- Subheading: tight to primary -->
  <text 
    x="64" 
    y="140" 
    font-family="Arial, Helvetica, sans-serif" 
    font-size="24" 
    font-weight="400" 
    fill="#5A5650"
    letter-spacing="1">EXTENSION FOR PI</text>
  
  <!-- Blueprint accent bar -->
  <rect x="64" y="160" width="480" height="4" fill="#2B5F75"/>
  
  <!-- Manifesto body: functional, left-aligned -->
  <text 
    x="64" 
    y="220" 
    font-family="Arial, Helvetica, sans-serif" 
    font-size="32" 
    font-weight="700" 
    fill="#2A2825"
    letter-spacing="-1">DESIGN THAT</text>
  
  <text 
    x="64" 
    y="260" 
    font-family="Arial, Helvetica, sans-serif" 
    font-size="32" 
    font-weight="700" 
    fill="#2A2825"
    letter-spacing="-1">DEFAULTS</text>
  
  <!-- Geometric element: workshop square -->
  <rect x="64" y="300" width="120" height="120" fill="none" stroke="#2A2825" stroke-width="3"/>
  <rect x="72" y="308" width="104" height="104" fill="none" stroke="#2B5F75" stroke-width="1"/>
  
  <!-- Small caps descriptor -->
  <text 
    x="210" 
    y="340" 
    font-family="Arial, Helvetica, sans-serif" 
    font-size="16" 
    font-weight="700" 
    fill="#5A5650"
    letter-spacing="3"
    text-transform="uppercase">PREVENTS GENERIC</text>
  
  <text 
    x="210" 
    y="365" 
    font-family="Arial, Helvetica, sans-serif" 
    font-size="16" 
    font-weight="700" 
    fill="#5A5650"
    letter-spacing="3"
    text-transform="uppercase">AI AESTHETICS</text>
  
  <text 
    x="210" 
    y="390" 
    font-family="Arial, Helvetica, sans-serif" 
    font-size="16" 
    font-weight="700" 
    fill="#5A5650"
    letter-spacing="3"
    text-transform="uppercase">FORCES MATERIAL</text>
  
  <text 
    x="210" 
    y="415" 
    font-family="Arial, Helvetica, sans-serif" 
    font-size="16" 
    font-weight="700" 
    fill="#5A5650"
    letter-spacing="3"
    text-transform="uppercase">THINKING</text>
  
  <!-- Footer mark: Swiss brutalist credits -->
  <text 
    x="64" 
    y="460" 
    font-family="monospace" 
    font-size="12" 
    font-weight="400" 
    fill="#8A857D"
    letter-spacing="0">DESIGNED WITH INTENTION / NOT ASSEMBLED FROM TEMPLATES</text>
</svg>
