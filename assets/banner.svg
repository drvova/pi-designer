<svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8F5EE"/>
      <stop offset="100%" stop-color="#F2EDE2"/>
    </linearGradient>
  </defs>

  <!-- Paper background with subtle warmth -->
  <rect width="1200" height="400" fill="url(#paper)"/>

  <!-- Single thin rule, top — sets the baseline like a real document -->
  <rect x="80" y="48" width="1040" height="1" fill="#D4A574" opacity="0.3"/>

  <!-- Eyebrow: quiet, tracked, like a magazine masthead -->
  <text x="80" y="40" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#A09585" letter-spacing="4">NATIVE PI EXTENSION</text>
  <text x="1120" y="40" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#A09585" letter-spacing="4">V6.0.0</text>

  <!-- THE DESIGN: one word, enormous, bleeding past the right edge -->
  <!-- "pi-designer" but broken so "designer" carries the weight -->
  <text x="76" y="210" font-family="Georgia, 'Times New Roman', serif" font-size="128" font-weight="400" fill="#1A1714" letter-spacing="-6">
    pi<tspan font-style="italic" fill="#C89060">-</tspan>designer
  </text>

  <!-- The "designer" word extends past the frame — deliberate bleed -->
  <!-- (the text naturally extends; the frame clips it visually) -->

  <!-- Subtitle: tight beneath, serif italic, like editorial dek -->
  <text x="80" y="252" font-family="Georgia, serif" font-size="18" font-style="italic" fill="#6B6358">
    380 design skills. Rules that refuse defaults. Zero context bloat until called.
  </text>

  <!-- One visual element: a vertical amber bar that interrupts the text baseline -->
  <!-- This is the "rule-break" — a single mark that shows intention -->
  <rect x="64" y="120" width="3" height="120" fill="#D4A574"/>

  <!-- Install: monospace, small, treated as a caption not a CTA -->
  <text x="80" y="300" font-family="'Courier New', monospace" font-size="13" fill="#6B6358">
    $ pi install npm:pi-designer
  </text>

  <!-- Bottom: a single line of metadata, quiet -->
  <rect x="80" y="360" width="1040" height="1" fill="#D4A574" opacity="0.2"/>
  <text x="80" y="382" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#A09585" letter-spacing="2">
    380 SKILLS · 16 FEATURES · 13 PI APIS · ~575 TOKENS PER TURN
  </text>
  <text x="1120" y="382" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#A09585" letter-spacing="2">
    GITHUB.COM/DRVOVA/PI-DESIGNER
  </text>
</svg>
