<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="480" viewBox="0 0 1280 480" fill="none">
  <defs>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d4a574"/>
      <stop offset="1" stop-color="#c89860"/>
    </linearGradient>
    <linearGradient id="ocean" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4a7c7e"/>
      <stop offset="1" stop-color="#3a6264"/>
    </linearGradient>
    <pattern id="dither" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="3" height="3" fill="#1a1814"/>
      <rect x="3" y="3" width="3" height="3" fill="#1a1814"/>
      <rect x="3" y="0" width="3" height="3" fill="#13110f"/>
      <rect x="0" y="3" width="3" height="3" fill="#13110f"/>
    </pattern>
  </defs>

  <!-- Background — warm dark, dithered -->
  <rect width="1280" height="480" fill="#0c0a08"/>
  <rect width="640" height="480" fill="url(#dither)" opacity="0.5"/>

  <!-- Divider -->
  <rect x="640" y="0" width="1" height="480" fill="#d4a574" fill-opacity="0.1"/>

  <!-- ============ LEFT: "BEFORE" — the generic AI default ============ -->
  <g font-family="system-ui, sans-serif">
    <text x="40" y="36" font-size="9" font-weight="700" fill="#52525b" letter-spacing="3">WITHOUT PI-DESIGNER</text>

    <!-- Fake generic card grid -->
    <g transform="translate(40, 60)">
      <!-- Fake hero with gradient blob -->
      <rect width="260" height="70" rx="8" fill="#1a1a2e"/>
      <circle cx="200" cy="35" r="30" fill="#6366f1" fill-opacity="0.15"/>
      <circle cx="180" cy="25" r="20" fill="#818cf8" fill-opacity="0.1"/>
      <rect x="12" y="14" width="120" height="8" rx="2" fill="#818cf8" fill-opacity="0.3"/>
      <rect x="12" y="28" width="80" height="5" rx="2" fill="#6366f1" fill-opacity="0.2"/>
      <rect x="12" y="42" width="50" height="14" rx="3" fill="#6366f1" fill-opacity="0.25"/>

      <!-- 3 equal cards -->
      <rect x="0" y="82" width="82" height="60" rx="6" fill="#1a1a2e"/>
      <rect x="89" y="82" width="82" height="60" rx="6" fill="#1a1a2e"/>
      <rect x="178" y="82" width="82" height="60" rx="6" fill="#1a1a2e"/>
      <rect x="8" y="90" width="40" height="5" rx="2" fill="#818cf8" fill-opacity="0.2"/>
      <rect x="8" y="100" width="60" height="3" rx="1.5" fill="#52525b"/>
      <rect x="8" y="107" width="50" height="3" rx="1.5" fill="#52525b"/>
      <rect x="97" y="90" width="40" height="5" rx="2" fill="#818cf8" fill-opacity="0.2"/>
      <rect x="97" y="100" width="60" height="3" rx="1.5" fill="#52525b"/>
      <rect x="97" y="107" width="50" height="3" rx="1.5" fill="#52525b"/>
      <rect x="186" y="90" width="40" height="5" rx="2" fill="#818cf8" fill-opacity="0.2"/>
      <rect x="186" y="100" width="60" height="3" rx="1.5" fill="#52525b"/>
      <rect x="186" y="107" width="50" height="3" rx="1.5" fill="#52525b"/>
    </g>

    <!-- Red stamp -->
    <g transform="translate(180, 220) rotate(-8)">
      <rect x="0" y="0" width="140" height="26" rx="4" fill="none" stroke="#ef4444" stroke-opacity="0.3" stroke-width="1.5"/>
      <text x="14" y="18" font-size="10" font-weight="700" fill="#ef4444" fill-opacity="0.4" letter-spacing="2">GENERIC. FORGETTABLE.</text>
    </g>

    <!-- Problems list -->
    <g transform="translate(40, 270)" font-size="10" fill="#52525b">
      <text x="0" y="0">· Violet/cyan on near-black</text>
      <text x="0" y="18">· Gradient blob "hero"</text>
      <text x="0" y="36">· 3 equal cards, no hierarchy</text>
      <text x="0" y="54">· Fits any product. Fits none.</text>
      <text x="0" y="72">· No focus states, no reduced-motion</text>
    </g>
  </g>

  <!-- ============ RIGHT: "AFTER" — pi-designer guided ============ -->
  <g font-family="system-ui, sans-serif">
    <text x="680" y="36" font-size="9" font-weight="700" fill="#d4a574" letter-spacing="3">WITH PI-DESIGNER</text>

    <!-- Bold asymmetric hero with product-specific anchor -->
    <g transform="translate(680, 52)">
      <!-- Asymmetric layout: text 7, visual 3 -->
      <rect width="560" height="100" rx="10" fill="#14110d"/>

      <!-- Left: bold headline -->
      <text x="20" y="32" font-size="22" font-weight="800" fill="#e4e4e7" letter-spacing="-1">From bean to cup.</text>
      <text x="20" y="52" font-size="10" fill="#71717a">Single-origin, roasted weekly.</text>
      <rect x="20" y="64" width="80" height="22" rx="5" fill="#d4a574"/>
      <text x="35" y="79" font-size="9" font-weight="600" fill="#0c0a08">SUBSCRIBE</text>

      <!-- Right: miniature product interface (real component, not blob) -->
      <rect x="340" y="12" width="200" height="76" rx="6" fill="#1c1813" stroke="#d4a574" stroke-opacity="0.1"/>
      <text x="352" y="28" font-size="7" fill="#52525b" letter-spacing="1">THIS WEEK'S ROAST</text>
      <text x="352" y="48" font-size="16" font-weight="700" fill="#d4a574" font-variant-numeric="tabular-nums">Ethiopia Yirgacheffe</text>
      <text x="352" y="62" font-size="8" fill="#71717a">Medium · Floral · Citrus</text>
      <rect x="352" y="70" width="40" height="3" rx="1.5" fill="#d4a574" fill-opacity="0.3"/>
      <rect x="352" y="70" width="28" height="3" rx="1.5" fill="#d4a574"/>
      <text x="400" y="73" font-size="7" fill="#52525b">68% sold</text>
    </g>

    <!-- Green stamp -->
    <g transform="translate(820, 220) rotate(-3)">
      <rect x="0" y="0" width="180" height="26" rx="4" fill="none" stroke="#5b6f3a" stroke-opacity="0.5" stroke-width="1.5"/>
      <text x="14" y="18" font-size="10" font-weight="700" fill="#5b6f3a" fill-opacity="0.6" letter-spacing="2">SPECIFIC. MEMORABLE. YOURS.</text>
    </g>

    <!-- Wins list -->
    <g transform="translate(680, 270)" font-size="10" fill="#8a8278">
      <text x="0" y="0" fill="#d4a574">· Warm amber palette derived from coffee</text>
      <text x="0" y="18" fill="#d4a574">· Real product component as hero anchor</text>
      <text x="0" y="36" fill="#d4a574">· Asymmetric 7/3 split, not centered</text>
      <text x="0" y="54" fill="#d4a574">· Bold display type (22px, weight 800)</text>
      <text x="0" y="72" fill="#d4a574">· Focus states, reduced-motion, tabular nums</text>
    </g>
  </g>

  <!-- ============ BOTTOM BAR ============ -->
  <g transform="translate(0, 370)">
    <rect width="1280" height="1" fill="#d4a574" fill-opacity="0.08"/>
    <rect width="1280" height="110" fill="#0a0908"/>

    <!-- Brand + install -->
    <g transform="translate(40, 20)" font-family="system-ui, sans-serif">
      <rect x="0" y="0" width="28" height="28" rx="7" fill="url(#amber)"/>
      <text x="36" y="20" font-size="18" font-weight="800" fill="#e4e4e7" letter-spacing="-0.5">pi<tspan fill="url(#amber)">-designer</tspan></text>

      <rect x="36" y="34" width="250" height="28" rx="6" fill="#14110d" stroke="#d4a574" stroke-opacity="0.08"/>
      <text x="48" y="52" font-family="'JetBrains Mono', monospace" font-size="11" fill="#4a7c7e">$</text>
      <text x="60" y="52" font-family="'JetBrains Mono', monospace" font-size="11" fill="#d4a574">pi install npm:pi-designer</text>
    </g>

    <!-- Stats row -->
    <g transform="translate(360, 30)" font-family="'JetBrains Mono', monospace">
      <text x="0" y="12" font-size="16" font-weight="700" fill="#d4a574" font-variant-numeric="tabular-nums">380</text>
      <text x="0" y="28" font-size="8" fill="#52525b" letter-spacing="1">SKILLS</text>

      <text x="80" y="12" font-size="16" font-weight="700" fill="#4a7c7e" font-variant-numeric="tabular-nums">16</text>
      <text x="80" y="28" font-size="8" fill="#52525b" letter-spacing="1">FEATURES</text>

      <text x="160" y="12" font-size="16" font-weight="700" fill="#5b6f3a" font-variant-numeric="tabular-nums">13</text>
      <text x="160" y="28" font-size="8" fill="#52525b" letter-spacing="1">PI APIS</text>

      <text x="240" y="12" font-size="16" font-weight="700" fill="#d4a574" font-variant-numeric="tabular-nums">~575</text>
      <text x="240" y="28" font-size="8" fill="#52525b" letter-spacing="1">TOK/TURN</text>
    </g>

    <!-- Arrow connecting before to after -->
    <g transform="translate(600, 50)">
      <path d="M 0 0 L 40 0 M 35 -5 L 40 0 L 35 5" stroke="#d4a574" stroke-opacity="0.3" stroke-width="1.5" fill="none"/>
      <text x="48" y="4" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#d4a574">always-on rules</text>
      <text x="48" y="20" font-family="system-ui, sans-serif" font-size="9" fill="#52525b">force specificity every turn</text>
    </g>

    <!-- GitHub link -->
    <text x="1240" y="60" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="9" fill="#3f3f46">github.com/drvova/pi-designer</text>
  </g>
</svg>
