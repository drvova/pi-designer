<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="560" viewBox="0 0 1280 560" fill="none" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d4a574"/>
      <stop offset="0.6" stop-color="#c89060"/>
      <stop offset="1" stop-color="#a07040"/>
    </linearGradient>
    <pattern id="grain" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="2" height="2" fill="#15120e"/>
      <rect x="2" y="2" width="2" height="2" fill="#15120e"/>
      <rect x="2" y="0" width="2" height="2" fill="#0e0c0a"/>
      <rect x="0" y="2" width="2" height="2" fill="#0e0c0a"/>
    </pattern>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Canvas -->
  <rect width="1280" height="560" fill="#0a0908"/>
  <rect width="1280" height="560" fill="url(#grain)" opacity="0.35"/>

  <!-- Warm glow top-right (one light source, deliberate) -->
  <circle cx="1100" cy="80" r="320" fill="#d4a574" fill-opacity="0.03"/>
  <circle cx="1100" cy="80" r="160" fill="#d4a574" fill-opacity="0.04"/>

  <!-- ============ HERO TYPE — display scale, editorial ============ -->
  <!-- The word IS the design. No boxes around it. -->

  <text x="64" y="120" font-size="10" letter-spacing="6" fill="#52525b" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
    A NATIVE PI EXTENSION
  </text>

  <!-- Massive display type — 6x the label above it -->
  <text x="60" y="200" font-size="72" font-weight="400" fill="#e4e4e7" letter-spacing="-3">
    Stop shipping
  </text>
  <text x="60" y="272" font-size="72" font-weight="400" letter-spacing="-3">
    <tspan fill="url(#warm)" font-style="italic">generic</tspan><tspan fill="#e4e4e7"> design.</tspan>
  </text>

  <!-- Subtext — quiet, not competing -->
  <text x="64" y="312" font-size="14" fill="#71717a" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
    380 design skills. Always-on rules that refuse defaults. Zero context bloat.
  </text>

  <!-- Install — looks like a terminal, not a button -->
  <text x="64" y="352" font-size="13" fill="#4a7c7e" font-family="'Courier New', monospace">
    $ pi install npm:pi-designer
  </text>

  <!-- ============ RIGHT: one dramatic number, no grid ============ -->
  <!-- Instead of 4 equal stats, ONE bold number carries the weight -->

  <text x="1216" y="240" text-anchor="end" font-size="160" font-weight="400" fill="#d4a574" fill-opacity="0.9" letter-spacing="-8" font-style="italic">
    380
  </text>
  <text x="1216" y="278" text-anchor="end" font-size="13" fill="#52525b" font-family="'Helvetica Neue', sans-serif" letter-spacing="2">
    DESIGN SKILLS, LOADED ON DEMAND
  </text>
  <!-- Thin line connecting concept -->
  <line x1="700" y1="262" x2="1080" y2="262" stroke="#d4a574" stroke-opacity="0.06"/>

  <!-- ============ BOTTOM: editorial layout, not card grid ============ -->
  <!-- Three principles as an editorial spread, not boxes -->

  <line x1="64" y1="400" x2="1216" y2="400" stroke="#d4a574" stroke-opacity="0.06"/>

  <!-- Column 1: Composition -->
  <g transform="translate(64, 430)">
    <text x="0" y="0" font-size="9" fill="#d4a574" letter-spacing="3" font-family="'Helvetica Neue', sans-serif" font-weight="700">01 / COMPOSITION</text>
    <text x="0" y="22" font-size="13" fill="#a1a1aa" font-family="Georgia, serif" font-style="italic">
      <tspan x="0" dy="0">Never centered headline</tspan>
      <tspan x="0" dy="18">plus three equal cards.</tspan>
      <tspan x="0" dy="18" fill="#71717a">Force asymmetry.</tspan>
    </text>
  </g>

  <!-- Column 2: Specificity -->
  <g transform="translate(460, 430)">
    <text x="0" y="0" font-size="9" fill="#4a7c7e" letter-spacing="3" font-family="'Helvetica Neue', sans-serif" font-weight="700">02 / SPECIFICITY</text>
    <text x="0" y="22" font-size="13" fill="#a1a1aa" font-family="Georgia, serif" font-style="italic">
      <tspan x="0" dy="0">Derive color from the</tspan>
      <tspan x="0" dy="18">product's actual world.</tspan>
      <tspan x="0" dy="18" fill="#71717a">Not from tech trends.</tspan>
    </text>
  </g>

  <!-- Column 3: Constraint -->
  <g transform="translate(856, 430)">
    <text x="0" y="0" font-size="9" fill="#5b6f3a" letter-spacing="3" font-family="'Helvetica Neue', sans-serif" font-weight="700">03 / CONSTRAINT</text>
    <text x="0" y="22" font-size="13" fill="#a1a1aa" font-family="Georgia, serif" font-style="italic">
      <tspan x="0" dy="0">Transform and opacity</tspan>
      <tspan x="0" dy="18">only. One light source.</tspan>
      <tspan x="0" dy="18" fill="#71717a">Reduced motion always.</tspan>
    </text>
  </g>

  <!-- ============ FOOTER: quiet, confident ============ -->
  <text x="64" y="548" font-size="10" fill="#3f3f46" font-family="'Courier New', monospace">
    16 feature slices · 13 pi apis · ~575 tokens/turn · github.com/drvova/pi-designer
  </text>

  <!-- Brand mark — small, bottom right, like a colophon -->
  <g transform="translate(1184, 536)">
    <rect x="0" y="0" width="16" height="16" rx="4" fill="url(#warm)" opacity="0.6"/>
  </g>
</svg>
