<svg width="1280" height="500" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 500">
  <defs>
    <!-- Generic AI gradient blob -->
    <radialGradient id="genericBlob" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.3" />
    </radialGradient>
    
    <!-- Diagonal stripe pattern for stamp -->
    <pattern id="stripes" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="4" height="8" fill="#d4a574"/>
      <rect x="4" width="4" height="8" fill="transparent"/>
    </pattern>
  </defs>
  
  <!-- BEFORE: Generic AI side -->
  <rect width="640" height="500" fill="#18181b"/>
  
  <!-- Ugly gradient blob -->
  <ellipse cx="320" cy="140" rx="180" ry="120" fill="url(#genericBlob)" opacity="0.9"/>
  
  <!-- Three identical boring cards -->
  <rect x="120" y="260" width="120" height="140" fill="none" stroke="#71717a" stroke-width="1.5" rx="8"/>
  <rect x="260" y="260" width="120" height="140" fill="none" stroke="#71717a" stroke-width="1.5" rx="8"/>
  <rect x="400" y="260" width="120" height="140" fill="none" stroke="#71717a" stroke-width="1.5" rx="8"/>
  
  <!-- Generic "Inter" text sample -->
  <text x="320" y="100" font-family="system-ui, -apple-system" font-size="13" fill="#a1a1aa" text-anchor="middle" letter-spacing="0">
    Your Product Name Here
  </text>
  
  <!-- Label -->
  <text x="320" y="460" font-family="system-ui, -apple-system" font-size="11" fill="#52525b" text-anchor="middle" font-weight="500" letter-spacing="1">
    ALGORITHMIC AVERAGE
  </text>
  
  <!-- AFTER: Designed side -->
  <rect x="640" width="640" height="500" fill="#f5f2ec"/>
  
  <!-- Bold typographic statement -->
  <text x="960" y="160" font-family="serif" font-size="84" fill="#d4a574" text-anchor="middle" font-weight="900" letter-spacing="-3">
    PI
  </text>
  <text x="960" y="240" font-family="serif" font-size="84" fill="#1c1917" text-anchor="middle" font-weight="900" letter-spacing="-3">
    DESIGNER
  </text>
  
  <!-- Striking visual element: heavy rule -->
  <rect x="760" y="280" width="400" height="8" fill="#d4a574"/>
  <rect x="760" y="292" width="400" height="2" fill="#1c1917"/>
  
  <!-- Manifesto statement -->
  <text x="960" y="340" font-family="monospace" font-size="14" fill="#1c1917" text-anchor="middle" letter-spacing="0.5">
    LOAD A STYLE
  </text>
  <text x="960" y="365" font-family="monospace" font-size="14" fill="#1c1917" text-anchor="middle" letter-spacing="0.5">
    BUILD WITH INTENT
  </text>
  <text x="960" y="390" font-family="monospace" font-size="14" fill="#1c1917" text-anchor="middle" letter-spacing="0.5">
    REJECT THE TEMPLATE
  </text>
  
  <!-- Hard vertical split line -->
  <rect x="638" y="0" width="4" height="500" fill="#1c1917"/>
  
  <!-- REFUSES DEFAULTS stamp crossing boundary -->
  <g transform="translate(640, 250) rotate(-8)">
    <!-- Stamp background with pattern -->
    <rect x="-200" y="-45" width="400" height="90" fill="url(#stripes)" opacity="0.15"/>
    <rect x="-200" y="-45" width="400" height="90" fill="none" stroke="#d4a574" stroke-width="6"/>
    
    <!-- Stamp text -->
    <text x="0" y="12" font-family="monospace" font-size="36" fill="#d4a574" text-anchor="middle" font-weight="900" letter-spacing="2">
      REFUSES
    </text>
    <text x="0" y="45" font-family="monospace" font-size="28" fill="#d4a574" text-anchor="middle" font-weight="900" letter-spacing="4">
      DEFAULTS
    </text>
  </g>
</svg>
