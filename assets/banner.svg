<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="480" viewBox="0 0 1280 480" fill="none">
  <defs>
    <!-- Driftwood palette: warm amber + ocean teal + moss -->
    <linearGradient id="bg" x1="0" y1="0" x2="0.8" y2="1">
      <stop offset="0" stop-color="#0c0a08"/>
      <stop offset="0.4" stop-color="#0f0d0a"/>
      <stop offset="1" stop-color="#0a0a0c"/>
    </linearGradient>

    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d4a574"/>
      <stop offset="0.6" stop-color="#e0b585"/>
      <stop offset="1" stop-color="#c89860"/>
    </linearGradient>

    <linearGradient id="markGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d4a574"/>
      <stop offset="0.5" stop-color="#4a7c7e"/>
      <stop offset="1" stop-color="#5b6f3a"/>
    </linearGradient>

    <!-- Top glow — one light source from above -->
    <radialGradient id="topGlow" cx="0.5" cy="0" r="0.6">
      <stop offset="0" stop-color="#d4a574" stop-opacity="0.06"/>
      <stop offset="0.5" stop-color="#d4a574" stop-opacity="0.02"/>
      <stop offset="1" stop-color="#d4a574" stop-opacity="0"/>
    </radialGradient>

    <!-- Subtle dot texture -->
    <pattern id="dots" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="8" cy="8" r="0.4" fill="#d4a574" fill-opacity="0.025"/>
    </pattern>

    <!-- Concentric rings art piece (product-specific anchor) -->
    <radialGradient id="ringGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#d4a574" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#d4a574" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background layers -->
  <rect width="1280" height="480" fill="url(#bg)"/>
  <rect width="1280" height="480" fill="url(#dots)"/>
  <rect width="1280" height="480" fill="url(#topGlow)"/>

  <!-- Left accent line -->
  <rect x="0" y="0" width="3" height="480" fill="url(#amber)" opacity="0.4"/>

  <!-- ============ CONCENTRIC RING ART PIECE (right side, asymmetric anchor) ============ -->
  <g transform="translate(960, 240)">
    <circle cx="0" cy="0" r="180" fill="url(#ringGlow)"/>
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="140" fill="none" stroke="#d4a574" stroke-opacity="0.08" stroke-width="1"/>
    <circle cx="0" cy="0" r="110" fill="none" stroke="#4a7c7e" stroke-opacity="0.1" stroke-width="1"/>
    <circle cx="0" cy="0" r="80" fill="none" stroke="#d4a574" stroke-opacity="0.12" stroke-width="1"/>
    <circle cx="0" cy="0" r="50" fill="none" stroke="#5b6f3a" stroke-opacity="0.15" stroke-width="1"/>
    <!-- Orbiting dots -->
    <circle cx="0" cy="-140" r="3" fill="#d4a574"/>
    <circle cx="110" cy="0" r="2.5" fill="#4a7c7e"/>
    <circle cx="-80" cy="0" r="2" fill="#5b6f3a"/>
    <circle cx="0" cy="50" r="3" fill="#d4a574" opacity="0.6"/>
    <!-- Center mark -->
    <rect x="-16" y="-16" width="32" height="32" rx="8" fill="url(#markGrad)" opacity="0.8"/>
    <rect x="-10" y="-10" width="20" height="20" rx="5" fill="#0c0a08" opacity="0.4"/>
    <!-- Label -->
    <text x="0" y="175" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#3f3f46" letter-spacing="3">380 SKILLS ORBITING</text>
  </g>

  <!-- ============ TITLE BLOCK (left-weighted, asymmetric 7/5) ============ -->
  <g transform="translate(64, 0)">

    <!-- Brand mark + name -->
    <g transform="translate(0, 60)">
      <rect x="0" y="0" width="36" height="36" rx="8" fill="url(#markGrad)"/>
      <rect x="6" y="6" width="24" height="24" rx="5" fill="#0c0a08" opacity="0.3"/>
      <text x="48" y="26" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#71717a" letter-spacing="-0.5">pi-designer</text>
    </g>

    <!-- Headline — bold, 4x scale, tight leading -->
    <text x="0" y="130" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="52" fill="#e4e4e7" letter-spacing="-2.5">
      <tspan x="0" dy="0">Design that</tspan>
      <tspan x="0" dy="52" fill="url(#amber)">refuses to be</tspan>
      <tspan x="0" dy="52">generic.</tspan>
    </text>

    <!-- Tagline -->
    <text x="0" y="280" font-family="system-ui, sans-serif" font-size="15" fill="#71717a" font-weight="400">
      <tspan x="0" dy="0">Always-on design rules force specificity. 380 deferred skills load</tspan>
      <tspan x="0" dy="22">on demand. A visual deck presents options you actually choose.</tspan>
    </text>

    <!-- Install -->
    <rect x="0" y="340" width="320" height="38" rx="8" fill="#14110d" stroke="#d4a574" stroke-opacity="0.1"/>
    <text x="16" y="364" font-family="'JetBrains Mono', monospace" font-size="13" fill="#4a7c7e">$</text>
    <text x="30" y="364" font-family="'JetBrains Mono', monospace" font-size="13" fill="#d4a574">pi install npm:pi-designer</text>

    <!-- Badges -->
    <g font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600">
      <rect x="0" y="395" width="76" height="22" rx="4" fill="#d4a574" fill-opacity="0.08" stroke="#d4a574" stroke-opacity="0.15"/>
      <text x="9" y="410" fill="#d4a574">NATIVE</text>

      <rect x="84" y="395" width="62" height="22" rx="4" fill="#4a7c7e" fill-opacity="0.08" stroke="#4a7c7e" stroke-opacity="0.15"/>
      <text x="93" y="410" fill="#4a7c7e">v6.0.0</text>

      <rect x="154" y="395" width="86" height="22" rx="4" fill="#5b6f3a" fill-opacity="0.1" stroke="#5b6f3a" stroke-opacity="0.2"/>
      <text x="163" y="410" fill="#5b6f3a">16 SLICES</text>
    </g>
  </g>

  <!-- ============ STAT STRIP (bottom, thin grid) ============ -->
  <g transform="translate(0, 440)">
    <rect width="1280" height="1" fill="#d4a574" fill-opacity="0.06"/>
    <g font-family="'JetBrains Mono', monospace" font-size="10">
      <!-- Stat 1 -->
      <text x="64" y="20" fill="#d4a574" font-weight="700" font-size="14">380</text>
      <text x="64" y="35" fill="#52525b" font-size="9">SKILLS</text>
      <line x1="140" y1="8" x2="140" y2="38" stroke="#d4a574" stroke-opacity="0.06"/>

      <!-- Stat 2 -->
      <text x="160" y="20" fill="#4a7c7e" font-weight="700" font-size="14">13</text>
      <text x="160" y="35" fill="#52525b" font-size="9">PI APIS</text>
      <line x1="236" y1="8" x2="236" y2="38" stroke="#d4a574" stroke-opacity="0.06"/>

      <!-- Stat 3 -->
      <text x="256" y="20" fill="#5b6f3a" font-weight="700" font-size="14">6</text>
      <text x="256" y="35" fill="#52525b" font-size="9">HOOKS</text>
      <line x1="332" y1="8" x2="332" y2="38" stroke="#d4a574" stroke-opacity="0.06"/>

      <!-- Stat 4 -->
      <text x="352" y="20" fill="#d4a574" font-weight="700" font-size="14">~575</text>
      <text x="352" y="35" fill="#52525b" font-size="9">TOKENS/TURN</text>
      <line x1="452" y1="8" x2="452" y2="38" stroke="#d4a574" stroke-opacity="0.06"/>

      <!-- Architecture -->
      <text x="472" y="20" fill="#3f3f46">app</text>
      <text x="500" y="20" fill="#4a7c7e">→</text>
      <text x="514" y="20" fill="#3f3f46">features</text>
      <text x="572" y="20" fill="#4a7c7e">→</text>
      <text x="586" y="20" fill="#3f3f46">entities</text>
      <text x="644" y="20" fill="#4a7c7e">+</text>
      <text x="656" y="20" fill="#3f3f46">shared</text>
    </g>
  </g>
</svg>
